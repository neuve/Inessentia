name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: package.json
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://inessentia.mx
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      # GitHub Pages a veces rechaza un deploy si el anterior sigue
      # finalizando (más probable con pushes seguidos); un segundo intento
      # tras una breve espera resuelve la mayoría de estos casos.
      - if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
